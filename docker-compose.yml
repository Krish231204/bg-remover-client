version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bgremover-mysql
    environment:
      MYSQL_ROOT_PASSWORD: shiv
      MYSQL_DATABASE: bgremoverdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bgremover-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bgremoverdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: shiv
      CLERK_ISSUER: ${CLERK_ISSUER}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bgremover-network

  # Frontend service (optional - for production builds)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bgremover-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    depends_on:
      - backend
    networks:
      - bgremover-network

volumes:
  mysql_data:

networks:
  bgremover-network:
    driver: bridge
