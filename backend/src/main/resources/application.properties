spring.datasource.url=jdbc:mysql://localhost:3306/bgremoverdb
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update

clerk.issuer=https://fancy-beagle-2.clerk.accounts.dev
clerk.jwks-url=https://fancy-beagle-2.clerk.accounts.dev/.well-known/jwks.json
# CORS Configuration
server.servlet.context-path=/api
